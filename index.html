<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#263238">
  <title>Simple Mystery Dungeon</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./style.css?v=0.2.2">
</head>
<body>
<div id="app">
  <header class="topbar">
    <div><h1>Simple Mystery Dungeon</h1><div class="ver">PWA ROGUELIKE v0.2.2</div></div>
    <button id="btnUpdate" class="small">最新版に更新</button>
  </header>

  <section class="panel setup">
    <label>プレイヤー名<input id="playerName" maxlength="16" placeholder="なまえ"></label>
    <label>ダンジョン<select id="dungeonSelect">
      <option value="beginner">初心者の洞窟 / 10階</option>
      <option value="herb">薬草の迷宮 / 15階</option>
      <option value="deep">もっと不思議な迷宮 / 30階</option>
    </select></label>
    <button id="btnNewGame" class="main">冒険を開始</button>
    <button id="btnRanking" class="sub">ランキング更新</button>
    <p>方向キー・WASD・画面の十字キーで移動。敵に向かって移動すると攻撃。階段「▽」で次階、店「店」で購入・売却。5階ごとの帰還ポイント、帰還の巻物、クリア時だけ持ち帰れます。</p>
  </section>

  <section class="layout">
    <main class="game panel">
      <div class="status">
        <div>階層<b id="stFloor">-</b></div><div>Lv<b id="stLevel">-</b></div><div>HP<b id="stHp">-</b></div>
        <div>満腹<b id="stFood">-</b></div><div>G<b id="stGold">-</b></div><div>スコア<b id="stScore">-</b></div>
      </div>
      <div class="equip"><div>武器：<b id="eqWeapon">なし</b></div><div>盾：<b id="eqShield">なし</b></div><div>指輪：<b id="eqRing">なし</b></div></div>
      <div id="board" class="board"></div>
      <div class="ctrl">
        <button data-dir="up-left">↖</button><button data-dir="up">↑</button><button data-dir="up-right">↗</button>
        <button data-dir="left">←</button><button id="btnWait">待</button><button data-dir="right">→</button>
        <button data-dir="down-left">↙</button><button data-dir="down">↓</button><button data-dir="down-right">↘</button>
      </div>
      <div class="actions">
        <button id="btnUse" class="sub">選択を使う</button><button id="btnEquip" class="sub">選択を装備</button>
        <button id="btnDrop" class="sub">床に置く</button><button id="btnSwapFloor" class="sub">床と交換</button>
        <button id="btnReturn" class="safe">帰還</button><button id="btnGiveUp" class="danger">あきらめる</button>
      </div>
    </main>

    <aside>
      <section class="panel"><h2>持ち物</h2><div id="bagInfo" class="note">-</div><div id="inventory" class="list">-</div></section>
      <section class="panel"><h2>店</h2><div id="shop" class="list muted">店に乗ると商品が表示されます。</div></section>
      <section class="panel"><h2>倉庫</h2><div class="actions"><button id="btnTakeWh" class="mini">選択を持ち出す</button></div><div id="warehouse" class="list">-</div><div class="note">倉庫の出し入れは冒険前のみ。帰還ポイント・帰還の巻物・クリア時に持ち物と装備を保存します。あきらめると全ロストします。</div></section>
      <section class="panel"><h2>ログ</h2><div id="log" class="log"></div></section>
      <section class="panel"><h2>ダンジョン別ランキング</h2><ol id="ranking"></ol><div id="rankingNote" class="note"></div></section>
    </aside>
  </section>

  <dialog id="result"><h2 id="resultTitle">結果</h2><p id="resultText"></p><div class="actions"><button id="btnSubmit" class="main">ランキング登録</button><button id="btnClose" class="sub">閉じる</button></div></dialog>
</div>
<script src="./app.js?v=0.2.2"></script>
</body>
</html>
